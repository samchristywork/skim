<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skim</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
  </head>
  <body>
    <div class="content">
      <div class="sticky-header">
        <div class="title-bar">
          <div class="title-group">
            <h1>Skim</h1>
            <button id="editTextButton" class="edit-text-btn" hidden>Edit text</button>
          </div>
          <div class="controls">
            <button id="playPauseButton">Play</button>
            <div id="speedControl">
              <label id="speedLabel" for="speed">Speed:</label>
              <input type="number" id="speed" value="20" min="1" max="100" step="1">
            </div>
            <span class="time"><span id="time"></span></span>
            <button id="darkModeToggle">Dark</button>
          </div>
        </div>
      </div>
      <div class="setup">
        <textarea id="textInput" placeholder="Paste your text here..."></textarea>
        <div class="help">
          <p>Paste your text above and click <strong>Play</strong> to begin. Click any paragraph to jump to it.</p>
          <ul>
            <li><kbd>Space</kbd> — play / pause</li>
            <li><kbd>←</kbd> <kbd>→</kbd> or <kbd>P</kbd> <kbd>N</kbd> — previous / next paragraph</li>
            <li><kbd>↑</kbd> <kbd>↓</kbd> — adjust speed</li>
            <li><kbd>R</kbd> — restart</li>
          </ul>
        </div>
      </div>
      <div class="reading-content"></div>
    </div>
  </body>
</html>
