<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skim</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
  </head>
  <body>
    <div class="content">
      <div class="help">
        <p>Paste text above and click <strong>Play</strong> to begin. Click any paragraph to jump to it.</p>
        <ul>
          <li><kbd>Space</kbd> — play / pause</li>
          <li><kbd>←</kbd> <kbd>→</kbd> or <kbd>P</kbd> <kbd>N</kbd> — previous / next paragraph</li>
          <li><kbd>↑</kbd> <kbd>↓</kbd> — adjust speed</li>
          <li><kbd>R</kbd> — restart</li>
        </ul>
      </div>
      <div class="sticky-header">
        <div class="input-controls">
          <textarea id="textInput" placeholder="Enter your text here..."></textarea>
          <div class="controls-row">
            <button id="playPauseButton">Play</button>
            <div id="speedControl">
              <label id="speedLabel" for="speed">Speed:</label>
              <input type="number" id="speed" value="20" min="1" max="100" step="1">
            </div>
          </div>
        </div>
        <div class="time"><span id="time"></span></div>
      </div>
    </div>
  </body>
</html>
